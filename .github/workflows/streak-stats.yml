name: Update streak stats

on:
  schedule:
    - cron: "0 3 * * *"   # runs daily at 03:00 UTC
  push:
    paths:
      - ".github/workflows/streak-stats.yml"  # re-run if you edit this file
  workflow_dispatch:        # lets you trigger it manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate streak stats
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=PabasaraIlankoon&theme=radical&hide_border=true&background=0D1117&ring=FF6B35&fire=F09819&currStreakLabel=FF6B35
          path: profile/streak.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit streak stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/streak.svg
          git commit -m "Update streak stats" || exit 0
          git push
