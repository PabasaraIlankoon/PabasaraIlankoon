name: Update Profile Cards

on:
  schedule:
    - cron: "0 3 * * *"   # runs daily at 03:00 UTC
  push:
    paths:
      - ".github/workflows/profile-cards.yml"  # re-run if you edit this file
  workflow_dispatch:        # lets you trigger it manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate GitHub stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=PabasaraIlankoon&show_icons=true&theme=radical&hide_border=true&bg_color=0D1117&title_color=FF6B35&icon_color=F09819&text_color=c9d1d9&count_private=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=PabasaraIlankoon&layout=compact&theme=radical&hide_border=true&bg_color=0D1117&title_color=FF6B35&text_color=c9d1d9
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate streak stats card
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=PabasaraIlankoon&theme=radical&hide_border=true&background=0D1117&ring=FF6B35&fire=F09819&currStreakLabel=FF6B35
          path: profile/streak.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit stats, top-langs, and streak cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update profile cards" || exit 0
          git push
